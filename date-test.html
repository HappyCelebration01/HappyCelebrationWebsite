<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker Options Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Flatpickr CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <style>
    :root {
      --screen-bg: #150006;
      --card-bg: rgba(130, 4, 33, 0.54);
      --card-border: rgba(229, 39, 78, 0.84);
      --gold-100: #fff2bd;
      --gold-300: #f5c76e;
      --gold-500: #c9822d;
      --ink: #ffffff;
      --soft: rgba(255, 255, 255, 0.78);
    }

    body {
      background: #080609;
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: min(420px, 100%);
      background: var(--screen-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      margin-bottom: 24px;
    }

    h2 {
      color: var(--gold-300);
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 24px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px dashed rgba(245, 199, 110, 0.2);
      padding-bottom: 12px;
    }

    h3 {
      font-size: 15px;
      color: var(--gold-100);
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .demo-section {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .demo-section:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--soft);
    }

    /* Style for Option 1: Dropdown Selects */
    .dropdown-group {
      display: flex;
      gap: 8px;
    }

    .dropdown-group select {
      flex: 1;
      background: rgba(30, 4, 12, 0.85);
      border: 1px solid rgba(245, 199, 110, 0.4);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .dropdown-group select:focus {
      border-color: var(--gold-300);
      box-shadow: 0 0 6px rgba(245, 199, 110, 0.2);
    }

    .dropdown-group select option {
      background: #1e040c;
      color: #fff;
    }

    /* Style for Option 2: Flatpickr Input */
    .flatpickr-input-wrapper {
      position: relative;
    }

    .flatpickr-input-wrapper input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(30, 4, 12, 0.85);
      border: 1px solid rgba(245, 199, 110, 0.4);
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .flatpickr-input-wrapper input:focus {
      border-color: var(--gold-300);
      box-shadow: 0 0 6px rgba(245, 199, 110, 0.2);
    }

    /* CUSTOM WINE & GOLD THEME FOR FLATPICKR CALENDAR POPUP */
    .flatpickr-calendar {
      background: #1e040c !important;
      border: 1.5px solid var(--gold-300) !important;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7) !important;
      font-family: 'Outfit', sans-serif !important;
      border-radius: 12px !important;
    }

    .flatpickr-months {
      background: #36000f !important;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      padding: 4px 0;
    }

    .flatpickr-current-month {
      color: var(--gold-100) !important;
      font-weight: 600;
    }

    .flatpickr-current-month .numInputWrapper span.arrowUp::after {
      border-bottom-color: var(--gold-300) !important;
    }
    .flatpickr-current-month .numInputWrapper span.arrowDown::after {
      border-top-color: var(--gold-300) !important;
    }

    .flatpickr-monthDropdown-months {
      color: var(--gold-100) !important;
      font-family: inherit !important;
      font-weight: 600 !important;
    }

    span.flatpickr-weekday {
      background: #36000f !important;
      color: rgba(255, 255, 255, 0.6) !important;
      font-weight: 600 !important;
    }

    .flatpickr-day {
      color: #fff !important;
      border-radius: 50% !important;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .flatpickr-day:hover {
      background: rgba(245, 199, 110, 0.15) !important;
      border-color: var(--gold-300) !important;
    }

    .flatpickr-day.today {
      border-color: var(--gold-500) !important;
    }

    .flatpickr-day.selected {
      background: var(--gold-300) !important;
      border-color: var(--gold-300) !important;
      color: #150006 !important;
      font-weight: 700;
    }

    .flatpickr-day.prevMonthDay, 
    .flatpickr-day.nextMonthDay {
      color: rgba(255, 255, 255, 0.25) !important;
    }

    .flatpickr-months .flatpickr-prev-month, 
    .flatpickr-months .flatpickr-next-month {
      color: var(--gold-300) !important;
      fill: var(--gold-300) !important;
    }

    .flatpickr-months .flatpickr-prev-month:hover, 
    .flatpickr-months .flatpickr-next-month:hover {
      color: #fff !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Select Date Demo</h2>

    <!-- OPTION 1 DEMO -->
    <div class="demo-section">
      <h3><span>1.</span> Dropdown Selectors</h3>
      <label>Birth Date</label>
      <div class="dropdown-group">
        <!-- Day Select -->
        <select id="daySelect">
          <option value="">Day</option>
        </select>

        <!-- Month Select -->
        <select id="monthSelect">
          <option value="">Month</option>
          <option value="01">Jan</option>
          <option value="02">Feb</option>
          <option value="03">Mar</option>
          <option value="04">Apr</option>
          <option value="05">May</option>
          <option value="06">Jun</option>
          <option value="07">Jul</option>
          <option value="08">Aug</option>
          <option value="09">Sep</option>
          <option value="10">Oct</option>
          <option value="11">Nov</option>
          <option value="12">Dec</option>
        </select>

        <!-- Year Select -->
        <select id="yearSelect">
          <option value="">Year</option>
        </select>
      </div>
    </div>

    <!-- OPTION 2 DEMO -->
    <div class="demo-section">
      <h3><span>2.</span> Custom Dark Calendar</h3>
      <label>Birth Date</label>
      <div class="flatpickr-input-wrapper">
        <input type="text" id="flatpickrInput" placeholder="Select Date...">
      </div>
    </div>

  </div>

  <!-- Flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <script>
    // Populate Day dropdown (1 to 31)
    const daySelect = document.getElementById("daySelect");
    for (let i = 1; i <= 31; i++) {
      const val = String(i).padStart(2, '0');
      const opt = document.createElement("option");
      opt.value = val;
      opt.textContent = i;
      daySelect.appendChild(opt);
    }

    // Populate Year dropdown (1920 to current year)
    const yearSelect = document.getElementById("yearSelect");
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= 1920; i--) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      yearSelect.appendChild(opt);
    }

    // Initialize Flatpickr calendar
    flatpickr("#flatpickrInput", {
      dateFormat: "m/d/Y",
      disableMobile: "true" // forces our custom styles on mobile instead of system wheels
    });
  </script>
</body>
</html>
